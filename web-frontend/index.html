<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Virtual Art Gallery — an interactive 3D platform for art students to showcase their work." />
    <meta name="theme-color" content="#8b5cf6" />
    <title>Virtual Art Gallery</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
    
    <!-- AR/3D Support -->
    <style>
      /* Prevent pull-to-refresh on touch devices */
      body {
        touch-action: pan-x pan-y;
        overscroll-behavior: none;
      }
      
      /* Fullscreen mode for AR */
      :-webkit-full-screen {
        background: black;
      }
      
      /* Camera permission dialog styling */
      .camera-permission-dialog {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px;
        border-radius: 16px;
        z-index: 1000;
      }
    </style>
  </head>
  <body class="bg-stone-50 text-stone-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
